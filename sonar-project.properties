# ─── SonarQube Configuration ──────────────────────────────────────────────────

sonar.projectKey=Aurify-Auth
sonar.projectName=Aurify-Auth
sonar.projectVersion=1.0.0

# ─── Source & Test Directories ────────────────────────────────────────────────

sonar.sources=src
sonar.tests=src,test
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/generated/**,**/prisma/migrations/**

# ─── Language & Encoding ─────────────────────────────────────────────────────

sonar.language=ts
sonar.sourceEncoding=UTF-8

# ─── TypeScript / JavaScript ─────────────────────────────────────────────────

sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ─── Coverage ────────────────────────────────────────────────────────────────

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.e2e-spec.ts,**/main.ts,**/*.module.ts,**/generated/**

# ─── Duplication Exclusions ──────────────────────────────────────────────────

sonar.cpd.exclusions=**/*.spec.ts,**/*.e2e-spec.ts
